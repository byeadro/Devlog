<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="shared/shared.css">
  <link rel="stylesheet" href="popup.css">
  <title>Devlog</title>
</head>
<body>

  <!-- AUTH -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="auth-mark">/</div>
      <h1 class="auth-title">Devlog</h1>
      <p class="auth-sub">Your journal. Your dev log.</p>

      <div id="auth-form" class="auth-form">
        <input type="email" id="auth-email" class="auth-input" placeholder="email" autocomplete="email">
        <input type="password" id="auth-password" class="auth-input" placeholder="password" autocomplete="current-password">
        <button id="btn-login" class="btn-primary">Sign in</button>
        <button id="btn-signup" class="btn-ghost">Create account</button>
        <button id="btn-forgot" class="btn-link">Forgot password?</button>
        <p id="auth-error" class="auth-error"></p>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="app-screen" class="screen">
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-mark">/</span>
        <span class="topbar-title">devlog</span>
      </div>
      <div class="topbar-right">
        <div class="theme-selector" style="padding:0;gap:4px;">
          <button class="theme-dot" data-theme="warm-dark" title="Warm Dark" style="background:#C9A96E;width:12px;height:12px;"></button>
          <button class="theme-dot" data-theme="midnight" title="Midnight Blue" style="background:#58A6FF;width:12px;height:12px;"></button>
          <button class="theme-dot" data-theme="forest" title="Forest" style="background:#7CB87C;width:12px;height:12px;"></button>
          <button class="theme-dot" data-theme="light" title="Light" style="background:#B8860B;width:12px;height:12px;"></button>
        </div>
        <button id="btn-open-tab" class="tab-btn" title="Open full view">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9 2h5v5M14 2L8 8M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button id="btn-signout" class="tab-btn signout-btn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10.5 11.5L14 8l-3.5-3.5M14 8H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
        </button>
      </div>
    </header>

    <div id="name-prompt" class="name-prompt" style="display:none;">
      <p class="name-prompt-label">What should I call you?</p>
      <div class="name-prompt-row">
        <input type="text" id="name-input" class="auth-input name-input" placeholder="Your name">
        <button id="btn-save-name" class="btn-save">Save</button>
      </div>
    </div>
    <div id="greeting" class="greeting" style="display:none;"></div>

    <div class="write-date" id="write-date"></div>

    <div class="template-row" id="template-row">
      <button class="template-btn" data-template="standup" title="Standup">📋</button>
      <button class="template-btn" data-template="idea" title="Idea">💡</button>
      <button class="template-btn" data-template="bug" title="Bug">🐛</button>
      <button class="template-btn" data-template="rant" title="Rant">🔥</button>
    </div>
    <div class="timer-bar" id="timer-bar">
      <div class="timer-presets" id="timer-presets">
        <button class="timer-preset" data-minutes="5">5m</button>
        <button class="timer-preset" data-minutes="10">10m</button>
        <button class="timer-preset" data-minutes="15">15m</button>
        <button class="timer-preset" data-minutes="25">25m</button>
      </div>
      <div class="timer-active" id="timer-active" style="display:none;">
        <span class="timer-display" id="timer-display">25:00</span>
        <button class="timer-cancel" id="timer-cancel">&#x2715;</button>
      </div>
    </div>
    <div id="draft-indicator" class="draft-indicator">Draft restored</div>
    <div class="format-toolbar" id="format-toolbar">
      <button class="fmt-btn" data-action="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
      <button class="fmt-btn" data-action="italic" title="Italic (Ctrl+I)"><em>I</em></button>
      <button class="fmt-btn" data-action="heading" title="Heading">H</button>
      <button class="fmt-btn" data-action="code" title="Code">&lt;/&gt;</button>
      <button class="fmt-btn" data-action="checklist" title="Checklist">&#9744;</button>
      <button class="fmt-btn" data-action="list" title="List">&#8226;</button>
      <button class="fmt-btn" data-action="divider" title="Divider">&#8212;</button>
      <button class="fmt-btn" data-action="link" title="Link">&#128279;</button>
    </div>

    <textarea
      id="write-area"
      class="write-area"
      placeholder="Write something..."
      autofocus
    ></textarea>

    <div class="ambient-bar">
      <button class="ambient-btn" data-sound="silence" title="Off">🔇</button>
      <button class="ambient-btn" data-sound="rain" title="Rain">🌧️</button>
      <button class="ambient-btn" data-sound="lofi" title="Lo-fi">🎵</button>
      <button class="ambient-btn" data-sound="cafe" title="Cafe">☕</button>
      <input type="range" class="ambient-volume" min="0" max="100" value="30">
    </div>
    <div class="write-footer">
      <div class="footer-left">
        <div class="tag-input-row">
          <span class="tag-icon">#</span>
          <input type="text" id="tag-input" class="tag-input" placeholder="tags (comma separated)">
        </div>
        <span id="word-count" class="word-count">0 words</span>
        <select id="write-notebook" class="tag-filter-select" style="width:auto;font-size:10px;"><option value="">No notebook</option></select>
      </div>
      <button id="btn-save-template" class="tab-btn" title="Save as template">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button id="btn-save" class="btn-save" disabled>Save</button>
    </div>
    <div id="template-save-form" class="template-save-form" style="display:none;">
      <input type="text" id="tpl-name" class="auth-input" placeholder="Template name">
      <input type="text" id="tpl-icon" class="auth-input tpl-icon-input" placeholder="Icon" value="📝">
      <button id="btn-confirm-template" class="btn-save" style="height:30px;font-size:11px;">Save</button>
    </div>

    <div id="toast" class="toast">Saved</div>
  </div>

  <script src="firebase/firebase-app-compat.js"></script>
  <script src="firebase/firebase-auth-compat.js"></script>
  <script src="firebase/firebase-firestore-compat.js"></script>
  <script src="shared/firebase-config.js"></script>
  <script src="shared/firebase-service.js"></script>
  <script src="shared/markdown.js"></script>
  <script src="shared/utils.js"></script>
  <script src="shared/ambient.js"></script>
  <script src="shared/themes.js"></script>
  <script src="shared/particles.js"></script>
  <script src="shared/toolbar.js"></script>
  <script src="shared/slash-commands.js"></script>
  <script src="shared/timer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
